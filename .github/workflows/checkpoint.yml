name: Checkpoint (reusable)

on:
  workflow_call:
    inputs:
      s3_bucket:
        required: true
        type: string

jobs:
  checkpoint:
    runs-on: ubuntu-latest
    env:
      FDL_S3_ENDPOINT: https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
      FDL_S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      FDL_S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      FDL_S3_BUCKET: ${{ inputs.s3_bucket }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.13
      - run: uv lock --upgrade-package frozen-ducklake && uv sync

      - name: Pull DuckLake catalog
        run: uv run fdl pull default

      - name: Configure and run checkpoint
        run: |
          uv run fdl sql default "CALL ducklake.set_option('expire_older_than', '30 days')"
          uv run fdl sql default "CHECKPOINT"

      - name: Push DuckLake catalog
        run: uv run fdl push default
